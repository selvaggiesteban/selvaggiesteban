name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Verify wrangler
        run: |
          node node_modules/wrangler/bin/wrangler.js --version
          node node_modules/wrangler/bin/wrangler.js whoami
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      - name: Deploy
        id: deploy
        continue-on-error: true
        working-directory: dist/server
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          node ../../node_modules/wrangler/bin/wrangler.js deploy --config wrangler.json 2>&1 | tee /tmp/deploy.log
      - name: Show deploy log
        if: always()
        run: |
          echo "### Wrangler Deploy Output" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat /tmp/deploy.log >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
      - name: Fail if deploy failed
        if: steps.deploy.outcome == 'failure'
        run: exit 1
