name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Debug
        run: |
          echo "=== wrangler version ==="
          npx wrangler --version || node node_modules/wrangler/bin/wrangler.js --version
          echo "=== config file ==="
          ls -la dist/server/wrangler.json
          echo "=== config content ==="
          head -5 dist/server/wrangler.json
      - name: Deploy
        run: node node_modules/wrangler/bin/wrangler.js deploy --config dist/server/wrangler.json 2>&1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          WRANGLER_SEND_METRICS: "false"
