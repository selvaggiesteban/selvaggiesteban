name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Verify wrangler
        id: verify
        run: |
          set +e
          node node_modules/wrangler/bin/wrangler.js --version 2>&1
          echo "---whoami---"
          node node_modules/wrangler/bin/wrangler.js whoami 2>&1
          echo "---done---"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      - name: Prepare deploy config
        run: |
          node -e "
            const fs=require('fs');
            const c=JSON.parse(fs.readFileSync('dist/server/wrangler.json','utf8'));
            delete c.configPath;
            delete c.userConfigPath;
            c.main='dist/server/entry.mjs';
            c.assets.directory='dist/client';
            fs.writeFileSync('deploy-config.json',JSON.stringify(c));
          "
      - name: Deploy
        id: deploy
        run: |
          set +e
          node node_modules/wrangler/bin/wrangler.js deploy --config deploy-config.json 2>&1
          EXIT_CODE=$?
          echo "Deploy exit code: $EXIT_CODE"
          exit $EXIT_CODE
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
