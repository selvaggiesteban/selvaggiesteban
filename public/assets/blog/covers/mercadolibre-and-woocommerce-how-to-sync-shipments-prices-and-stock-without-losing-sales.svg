  </text>
  <text x="600" y="330" text-anchor="middle" fill="#94a3b8" font-size="22">
    Sincronizar Envíos, Precios y Stock
  </text>

  <!-- Accent line -->
  <rect x="440" y="360" width="320" height="4" rx="2" fill="url(#accent)"/>

  <!-- Subtitle -->
  <text x="600" y="410" text-anchor="middle" fill="#64748b" font-size="16">
    Sin fricciones entre canales. Precios idénticos. Logística equivalente.
  </text>

  <!-- Feature pills -->
  <g transform="translate(240, 450)">
    <rect x="0" y="0" width="140" height="32" rx="16" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="70" y="21" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="bold">Stock Sync</text>
  </g>
  <g transform="translate(400, 450)">
    <rect x="0" y="0" width="140" height="32" rx="16" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="70" y="21" text-anchor="middle" fill="#f59e0b" font-size="12" font-weight="bold">Precios Iguales</text>
  </g>
  <g transform="translate(560, 450)">
    <rect x="0" y="0" width="140" height="32" rx="16" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="70" y="21" text-anchor="middle" fill="#3b82f6" font-size="12" font-weight="bold">Logística</text>
  </g>
  <g transform="translate(720, 450)">
    <rect x="0" y="0" width="140" height="32" rx="16" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="70" y="21" text-anchor="middle" fill="#ef4444" font-size="12" font-weight="bold">Tracking</text>
  </g>

  <!-- Bottom tag -->
  <text x="600" y="598" text-anchor="middle" fill="#475569" font-size="14" font-family="monospace">selvaggiesteban.dev/blog/mercadolibre-woocommerce-sincronizar-envios-precios-stock</text>
