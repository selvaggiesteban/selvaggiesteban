<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffe600"/>
      <stop offset="100%" stop-color="#3483fa"/>
    </linearGradient>
    <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="80"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <circle cx="200" cy="180" r="200" fill="#ffe600" opacity="0.07" filter="url(#blur1)"/>
  <circle cx="1000" cy="450" r="180" fill="#3483fa" opacity="0.07" filter="url(#blur1)"/>

  <g fill="#334155" opacity="0.15">
    <circle cx="100" cy="80" r="1.5"/><circle cx="180" cy="80" r="1.5"/><circle cx="260" cy="80" r="1.5"/><circle cx="340" cy="80" r="1.5"/><circle cx="420" cy="80" r="1.5"/><circle cx="500" cy="80" r="1.5"/><circle cx="580" cy="80" r="1.5"/><circle cx="660" cy="80" r="1.5"/><circle cx="740" cy="80" r="1.5"/><circle cx="820" cy="80" r="1.5"/><circle cx="900" cy="80" r="1.5"/><circle cx="980" cy="80" r="1.5"/><circle cx="1060" cy="80" r="1.5"/><circle cx="1140" cy="80" r="1.5"/>
    <circle cx="100" cy="160" r="1.5"/><circle cx="180" cy="160" r="1.5"/><circle cx="260" cy="160" r="1.5"/><circle cx="340" cy="160" r="1.5"/><circle cx="420" cy="160" r="1.5"/><circle cx="500" cy="160" r="1.5"/><circle cx="580" cy="160" r="1.5"/><circle cx="660" cy="160" r="1.5"/><circle cx="740" cy="160" r="1.5"/><circle cx="820" cy="160" r="1.5"/><circle cx="900" cy="160" r="1.5"/><circle cx="980" cy="160" r="1.5"/><circle cx="1060" cy="160" r="1.5"/><circle cx="1140" cy="160" r="1.5"/>
  </g>

  <!-- ML Logo (simplified) -->
  <g transform="translate(340, 120)">
    <rect x="0" y="0" width="160" height="60" rx="8" fill="#ffe600"/>
    <text x="80" y="40" text-anchor="middle" fill="#2d3277" font-size="28" font-weight="bold">ML</text>
  </g>

  <!-- Arrow -->
  <g stroke="#475569" stroke-width="2" fill="none" stroke-linecap="round">
    <line x1="520" y1="150" x2="580" y2="150"/>
    <polyline points="570,140 580,150 570,160"/>
    <line x1="620" y1="150" x2="680" y2="150"/>
    <polyline points="670,140 680,150 670,160"/>
  </g>

  <!-- WC Logo (simplified) -->
  <g transform="translate(700, 120)">
    <rect x="0" y="0" width="160" height="60" rx="8" fill="#96588a"/>
    <text x="80" y="40" text-anchor="middle" fill="white" font-size="22" font-weight="bold">WC</text>
  </g>

  <!-- Sync icon -->
  <g transform="translate(560, 130)" stroke="#06b6d4" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M20 4 C28 4 32 8 32 14 C32 20 28 24 20 24"/>
    <polyline points="28,8 32,14 26,16"/>
    <path d="M12 28 C4 28 0 24 0 18 C0 12 4 8 12 8"/>
    <polyline points="4,24 0,18 6,16"/>
  </g>

  <!-- Title -->
  <text x="600" y="280" text-anchor="middle" fill="#f8fafc" font-size="40" font-weight="bold">
