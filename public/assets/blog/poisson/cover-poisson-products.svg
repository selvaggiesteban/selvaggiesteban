<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative blobs -->
  <circle cx="200" cy="150" r="180" fill="#06b6d4" opacity="0.08" filter="url(#blur1)"/>
  <circle cx="1000" cy="480" r="200" fill="#a78bfa" opacity="0.08" filter="url(#blur1)"/>

  <!-- Grid lines (subtle) -->
  <g stroke="#334155" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
  </g>

  <!-- Poisson bars - left cluster (simulating λt=3, bugs) -->
  <g transform="translate(60, 100)">
    <rect x="0" y="280" width="40" height="80" rx="4" fill="url(#bar1)" opacity="0.9"/>
    <rect x="50" y="220" width="40" height="140" rx="4" fill="url(#bar1)" opacity="0.9"/>
    <rect x="100" y="170" width="40" height="190" rx="4" fill="url(#bar1)" opacity="0.9"/>
    <rect x="150" y="240" width="40" height="120" rx="4" fill="url(#bar1)" opacity="0.7"/>
    <rect x="200" y="290" width="40" height="70" rx="4" fill="url(#bar1)" opacity="0.5"/>
    <rect x="250" y="320" width="40" height="40" rx="4" fill="url(#bar1)" opacity="0.4"/>
    <rect x="300" y="335" width="40" height="25" rx="4" fill="url(#bar1)" opacity="0.3"/>
  </g>

  <!-- Poisson curve overlay -->
  <path d="M 60 420 Q 130 350 200 300 Q 280 240 360 270 Q 440 310 520 370 Q 600 420 680 440" 
        stroke="url(#accent)" stroke-width="3" fill="none" opacity="0.8" stroke-linecap="round"/>

  <!-- Right side: code/terminal aesthetic -->
  <g transform="translate(720, 140)">
    <!-- Terminal window -->
    <rect x="0" y="0" width="420" height="300" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <!-- Title bar -->
    <rect x="0" y="0" width="420" height="36" rx="12" fill="#0f172a"/>
    <circle cx="20" cy="18" r="5" fill="#ef4444"/>
    <circle cx="36" cy="18" r="5" fill="#eab308"/>
    <circle cx="52" cy="18" r="5" fill="#22c55e"/>
    <text x="210" y="22" text-anchor="middle" fill="#64748b" font-size="12" font-family="monospace">poisson-products</text>

    <!-- Code lines -->
    <text x="20" y="64" fill="#64748b" font-size="13" font-family="monospace">$ </text>
    <text x="38" y="64" fill="#22c55e" font-size="13" font-family="monospace">poisson-products ./mi-proyecto</text>

    <text x="20" y="96" fill="#94a3b8" font-size="13" font-family="monospace">[Phase 0] Detecting technologies...</text>
    <text x="20" y="118" fill="#94a3b8" font-size="13" font-family="monospace">[Phase 1] Scanning routes &amp; models...</text>
    <text x="20" y="140" fill="#94a3b8" font-size="13" font-family="monospace">[Phase 3] Poisson simulation: λ(t)=4.2</text>

    <text x="20" y="172" fill="#f59e0b" font-size="13" font-family="monospace">⚠ 12 bugs predicted in 90 days</text>
    <text x="20" y="194" fill="#22c55e" font-size="13" font-family="monospace">✓ 7 fixed in Phase 4 (Playwright)</text>

    <text x="20" y="226" fill="#06b6d4" font-size="14" font-family="monospace" font-weight="bold">QUALITY SCORE: 200% ▲</text>

    <!-- Progress bar -->
    <rect x="20" y="244" width="380" height="8" rx="4" fill="#0f172a"/>
    <rect x="20" y="244" width="380" height="8" rx="4" fill="url(#accent)" opacity="0.8"/>
    <text x="20" y="272" fill="#64748b" font-size="11" font-family="monospace">████████████████████████ 100%</text>
  </g>

  <!-- Central text -->
  <text x="600" y="510" text-anchor="middle" fill="#f8fafc" font-size="42" font-weight="bold" letter-spacing="-1">
    Poisson × Products
  </text>
  <text x="600" y="545" text-anchor="middle" fill="#94a3b8" font-size="18">
    Predice bugs. Cumple deadlines. Supera el 200% de calidad.
  </text>

  <!-- Accent line -->
  <rect x="480" y="560" width="240" height="3" rx="2" fill="url(#accent)"/>

  <!-- Bottom tag -->
  <text x="600" y="598" text-anchor="middle" fill="#475569" font-size="13" font-family="monospace">github.com/selvaggiesteban/poisson_for_products</text>
</svg>